<!DOCTYPE html>
<html>
<head>
  <title>Sudu editor ESM sample</title>
  <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
  <style>

    html, body {
        height: 100%;
        background-color:#2b2b2b;
        margin: 0;
        padding: 0;
    }

    body {
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    #editor1 {
      position: absolute;
      top: 1%;
      height: 38%;
      left: 1%;
      width: 68%;
      background-color:#202b2b;
    }
    #editor2 {
      position: absolute;
      top: 1%;
      height: 58%;
      left: 70%;
      width: 29%;
      background-color:#20202b;
    }
    #editor3 {
      position: absolute;
      top: 40%;
      height: 59%;
      left: 1%;
      width: 38%;
      background-color:#2b2020;
    }
    #editor4 {
      position: absolute;
      top: 60%;
      height: 39%;
      left: 40%;
      width: 59%;
      background-color:#2b2b20;
    }

    #editor5 {
      position: absolute;
      top: 40%;
      height: 19%;
      left: 40%;
      width: 29%;
      background-color:#202b20;
    }

  </style>
</head>
<body>
<div id="editor1"></div>
<div id="editor2"></div>
<div id="editor3"></div>
<div id="editor4"></div>
<div id="editor5"></div>

<script type="module" charset="utf-8" src="example5views.js"></script>

</body>
</html>
